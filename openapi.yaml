              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomerUser"
        default:
          $ref: "#/components/responses/Error"
  /identity/customer/user_groups:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Customer User Groups]
      operationId: listCustomerUserGroups
      summary: List customer user groups
      responses:
        "200":
          description: Customer user groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerUserGroup"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Customer User Groups]
      operationId: createCustomerUserGroup
      summary: Create a customer user group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    user_ids:
                      type: array
                      items:
                        type: string
      responses:
        "201":
          description: The created group
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomerUserGroup"
        default:
          $ref: "#/components/responses/Error"
  /identity/customer/user_groups/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Customer User Groups]
      operationId: getCustomerUserGroup
      summary: Get a customer user group
      responses:
        "200":
          description: The group
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomerUserGroup"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Customer User Groups]
      operationId: updateCustomerUserGroup
      summary: Update a customer user group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  properties:
                    name:
                      type: string
                    user_ids:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: The updated group
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CustomerUserGroup"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Customer User Groups]
      operationId: deleteCustomerUserGroup
      summary: Delete a customer user group
      responses:
        "204":
          description: Group deleted
        default:
          $ref: "#/components/responses/Error"
  /identity/component_client_keys:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Component Client Keys]
      operationId: createComponentClientKey
      summary: Create a component client key
      description: >
        Creates a short-lived JWT for authenticating Duffel UI components in
        the browser. Scope it by passing user and/or resource IDs.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    user_id:
                      type: string
                    order_id:
                      type: string
                    booking_id:
                      type: string
                    offer_request_id:
                      type: string
      responses:
        "201":
          description: The component client key
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      component_client_key:
                        type: string
                        description: JWT for use with Duffel UI components
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Duffel access token (test or live)
  parameters:
    DuffelVersion:
      name: Duffel-Version
      in: header
      required: true
      schema:
        type: string
        const: v2
      description: The Duffel API version
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Maximum number of records per page
    After:
      name: after
      in: query
      schema:
        type: string
      description: Cursor for the page after this one
    Before:
      name: before
      in: query
      schema:
        type: string
      description: Cursor for the page before this one
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    # -------------------------------------------------------------------------
    # Shared
    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      properties:
        meta:
          type: object
          properties:
            request_id:
              type: string
            status:
              type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Error category, e.g. `validation_error`, `airline_error`
              title:
                type: string
              code:
                type: string
                description: Machine-readable error code
              message:
                type: string
              documentation_url:
                type: string
                format: uri
              source:
                type: object
                properties:
                  pointer:
                    type: string
                  parameter:
                    type: string
    ListMeta:
      type: object
      properties:
        limit:
          type: integer
        before:
          type: ["string", "null"]
        after:
          type: ["string", "null"]
          description: Cursor to pass as `after` to fetch the next page; null on the last page
    Metadata:
      type: object
      maxProperties: 50
      additionalProperties:
        type: string
        maxLength: 500
      description: Arbitrary key-value pairs (keys up to 40 chars, values up to 500)
    CabinClass:
      type: string
      enum: [first, business, premium_economy, economy]
    PrivateFares:
      type: object
      additionalProperties:
        type: array
        items:
          type: object
          properties:
            corporate_code:
              type: string
            tour_code:
              type: string
            tracking_reference:
              type: string
      description: Private fare codes keyed by airline IATA code
    LoyaltyProgrammeAccount:
      type: object
      required: [airline_iata_code, account_number]
      properties:
        airline_iata_code:
          type: string
        account_number:
          type: string
    GeographicCoordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
        longitude:
          type: number

    # -------------------------------------------------------------------------
    # Flights: search & offers
    # -------------------------------------------------------------------------
    CreateOfferRequest:
      type: object
      required: [slices, passengers]
      properties:
        slices:
          type: array
          items:
            type: object
            required: [origin, destination, departure_date]
            properties:
              origin:
                type: string
                description: Origin airport or city IATA code
              destination:
                type: string
                description: Destination airport or city IATA code
              departure_date:
                type: string
                format: date
              departure_time:
                $ref: "#/components/schemas/TimeRange"
              arrival_time:
                $ref: "#/components/schemas/TimeRange"
        passengers:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [adult, child, infant_without_seat]
              age:
                type: integer
                description: Alternative to `type` for non-adult passengers
              given_name:
                type: string
              family_name:
                type: string
              fare_type:
                type: string
                description: e.g. `student`, `contract_bulk`, `unaccompanied_minor`
              loyalty_programme_accounts:
                type: array
                items:
                  $ref: "#/components/schemas/LoyaltyProgrammeAccount"
        cabin_class:
          $ref: "#/components/schemas/CabinClass"
        max_connections:
          type: integer
          default: 1
          description: Maximum connections per slice
        private_fares:
          $ref: "#/components/schemas/PrivateFares"
        airline_credit_ids:
          type: array
          items:
            type: string
          description: Airline credits to evaluate against returned offers
    TimeRange:
      type: object
      properties:
        from:
          type: string
          description: Earliest time, HH:MM
        to:
          type: string
          description: Latest time, HH:MM
    OfferRequest:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        cabin_class:
          $ref: "#/components/schemas/CabinClass"
        client_key:
          type: string
          description: Token for use with Duffel UI components
        slices:
          type: array
          items:
            type: object
            properties:
              origin:
                $ref: "#/components/schemas/Place"
              destination:
                $ref: "#/components/schemas/Place"
              origin_type:
                type: string
                enum: [airport, city]
              destination_type:
                type: string
                enum: [airport, city]
              departure_date:
                type: string
                format: date
        passengers:
          type: array
          items:
            $ref: "#/components/schemas/OfferRequestPassenger"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
    OfferRequestPassenger:
      type: object
      properties:
        id:
          type: string
        type:
          type: ["string", "null"]
          enum: [adult, child, infant_without_seat, null]
        age:
          type: ["integer", "null"]
        given_name:
          type: ["string", "null"]
        family_name:
          type: ["string", "null"]
        fare_type:
          type: ["string", "null"]
        loyalty_programme_accounts:
          type: array
          items:
            $ref: "#/components/schemas/LoyaltyProgrammeAccount"
    BatchOfferRequest:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        total_batches:
          type: integer
        remaining_batches:
          type: integer
        client_key:
          type: string
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
    Offer:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        partial:
          type: boolean
          description: True if this is a partial offer from a partial offer request
        total_amount:
          type: string
        total_currency:
          type: string
        base_amount:
          type: string
        base_currency:
          type: string
        tax_amount:
          type: ["string", "null"]
        tax_currency:
          type: ["string", "null"]
        total_emissions_kg:
          type: ["string", "null"]
        owner:
          $ref: "#/components/schemas/Airline"
        slices:
          type: array
          items:
            $ref: "#/components/schemas/OfferSlice"
        passengers:
          type: array
          items:
            $ref: "#/components/schemas/OfferRequestPassenger"
        payment_requirements:
          type: object
          properties:
            requires_instant_payment:
              type: boolean
            price_guarantee_expires_at:
              type: ["string", "null"]
              format: date-time
            payment_required_by:
              type: ["string", "null"]
              format: date-time
        available_services:
          type: array
          items:
            $ref: "#/components/schemas/AvailableService"
          description: Only populated when requested with `return_available_services`
        passenger_identity_documents_required:
          type: boolean
        supported_passenger_identity_document_types:
          type: array
          items:
            type: string
        conditions:
          $ref: "#/components/schemas/OfferConditions"
        private_fares:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              corporate_code:
                type: string
              tracking_reference:
                type: string
    OfferConditions:
      type: object
      properties:
        change_before_departure:
          $ref: "#/components/schemas/OfferCondition"
        refund_before_departure:
          $ref: "#/components/schemas/OfferCondition"
    OfferCondition:
      type: ["object", "null"]
      properties:
        allowed:
          type: boolean
        penalty_amount:
          type: ["string", "null"]
        penalty_currency:
          type: ["string", "null"]
    OfferSlice:
      type: object
      properties:
        id:
          type: string
        origin:
          $ref: "#/components/schemas/Place"
        destination:
          $ref: "#/components/schemas/Place"
        origin_type:
          type: string
          enum: [airport, city]
        destination_type:
          type: string
          enum: [airport, city]
        duration:
          type: ["string", "null"]
          description: ISO 8601 duration
        fare_brand_name:
          type: ["string", "null"]
        segments:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
        conditions:
          type: object
          properties:
            change_before_departure:
              $ref: "#/components/schemas/OfferCondition"
    Segment:
      type: object
      properties:
        id:
          type: string
        origin:
          $ref: "#/components/schemas/Place"
        destination:
          $ref: "#/components/schemas/Place"
        origin_terminal:
          type: ["string", "null"]
        destination_terminal:
          type: ["string", "null"]
        departing_at:
          type: string
          format: date-time
        arriving_at:
          type: string
          format: date-time
        duration:
          type: ["string", "null"]
        distance:
          type: ["string", "null"]
          description: Distance in kilometres
        marketing_carrier:
          $ref: "#/components/schemas/Airline"
        marketing_carrier_flight_number:
          type: string
        operating_carrier:
          $ref: "#/components/schemas/Airline"
        operating_carrier_flight_number:
          type: ["string", "null"]
        aircraft:
          oneOf:
            - $ref: "#/components/schemas/Aircraft"
            - type: "null"
        stops:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              airport:
                $ref: "#/components/schemas/Airport"
              arriving_at:
                type: string
                format: date-time
              departing_at:
                type: string
                format: date-time
              duration:
                type: string
        passengers:
          type: array
          items:
            type: object
            properties:
              passenger_id:
                type: string
              cabin_class:
                $ref: "#/components/schemas/CabinClass"
              cabin_class_marketing_name:
                type: string
              fare_basis_code:
                type: ["string", "null"]
              baggages:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [checked, carry_on]
                    quantity:
                      type: integer
    AvailableService:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [baggage, seat, meal, cancel_for_any_reason]
        total_amount:
          type: string
        total_currency:
          type: string
        maximum_quantity:
          type: integer
        passenger_ids:
          type: array
          items:
            type: string
        segment_ids:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Type-specific details, e.g. baggage weight or seat designator
    Place:
      type: object
      description: An airport or city
      properties:
        id:
          type: string
        type:
          type: string
          enum: [airport, city]
        name:
          type: string
        iata_code:
          type: ["string", "null"]
        iata_city_code:
          type: ["string", "null"]
        iata_country_code:
          type: string
        icao_code:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        time_zone:
          type: ["string", "null"]
        city_name:
          type: ["string", "null"]
        city:
          oneOf:
            - $ref: "#/components/schemas/City"
            - type: "null"
        airports:
          type: array
          items:
            $ref: "#/components/schemas/Airport"

    # -------------------------------------------------------------------------
    # Flights: orders & payments
    # -------------------------------------------------------------------------
    CreateOrder:
      type: object
      required: [selected_offers, passengers]
      properties:
        type:
          type: string
          enum: [instant, hold]
          description: Hold orders are booked unpaid and paid later via Payments
        selected_offers:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 1
        passengers:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderPassenger"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/CreatePayment"
          description: Required for instant orders
        services:
          type: array
          items:
            type: object
            required: [id, quantity]
            properties:
              id:
                type: string
              quantity:
                type: integer
        users:
          type: array
          items:
            type: string
          description: Customer user IDs allowed to manage this order
        metadata:
          $ref: "#/components/schemas/Metadata"
    CreateOrderPassenger:
      type: object
      required: [id, given_name, family_name, born_on, title, gender]
      properties:
        id:
          type: string
          description: Passenger ID from the offer
        title:
          type: string
          enum: [mr, mrs, ms, miss, dr]
        given_name:
          type: string
        family_name:
          type: string
        gender:
          type: string
          enum: [m, f]
        born_on:
          type: string
          format: date
        email:
          type: string
          format: email
        phone_number:
          type: string
          description: E.164 format
        infant_passenger_id:
          type: ["string", "null"]
          description: For an adult responsible for an infant
        identity_documents:
          type: array
          items:
            type: object
            required: [type, unique_identifier, issuing_country_code]
            properties:
              type:
                type: string
                enum: [passport, tax_id, known_traveler_number, passenger_redress_number]
              unique_identifier:
                type: string
              issuing_country_code:
                type: string
              expires_on:
                type: string
                format: date
        loyalty_programme_accounts:
          type: array
          items:
            $ref: "#/components/schemas/LoyaltyProgrammeAccount"
        user_id:
          type: string
          description: Link this passenger to a customer user
    CreatePayment:
      type: object
      required: [type, amount, currency]
      properties:
        type:
          type: string
          enum: [balance, arc_bsp_cash, card]
        amount:
          type: string
        currency:
          type: string
        card_id:
          type: string
          description: Required when type is `card`
        three_d_secure_session_id:
          type: string
          description: 3DS session for the card payment
    Order:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        booking_reference:
          type: string
          description: Airline PNR
        type:
          type: string
          enum: [instant, hold]
        awaiting_payment:
          type: boolean
        payment_status:
          type: object
          properties:
            awaiting_payment:
              type: boolean
            payment_required_by:
              type: ["string", "null"]
              format: date-time
            price_guarantee_expires_at:
              type: ["string", "null"]
              format: date-time
            paid_at:
              type: ["string", "null"]
              format: date-time
        total_amount:
          type: string
        total_currency:
          type: string
        base_amount:
          type: ["string", "null"]
        base_currency:
          type: ["string", "null"]
        tax_amount:
          type: ["string", "null"]
        tax_currency:
          type: ["string", "null"]
        owner:
          $ref: "#/components/schemas/Airline"
        slices:
          type: array
          items:
            $ref: "#/components/schemas/OfferSlice"
        passengers:
          type: array
          items:
            $ref: "#/components/schemas/OrderPassenger"
        services:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              total_amount:
                type: string
              total_currency:
                type: string
              quantity:
                type: integer
              passenger_ids:
                type: array
                items:
                  type: string
              segment_ids:
                type: array
                items:
                  type: string
              metadata:
                type: object
        documents:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: e.g. `electronic_ticket`
              unique_identifier:
                type: string
              passenger_ids:
                type: array
                items:
                  type: string
        conditions:
          $ref: "#/components/schemas/OfferConditions"
        cancellation:
          oneOf:
            - $ref: "#/components/schemas/OrderCancellation"
            - type: "null"
        airline_initiated_changes:
          type: array
          items:
            $ref: "#/components/schemas/AirlineInitiatedChange"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/OrderChange"
        content:
          type: string
          enum: [managed, self_managed]
        metadata:
          $ref: "#/components/schemas/Metadata"
        users:
          type: array
          items:
            type: string
    OrderPassenger:
      allOf:
        - $ref: "#/components/schemas/CreateOrderPassenger"
        - type: object
          properties:
            type:
              type: string
              enum: [adult, child, infant_without_seat]
    Payment:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        type:
          type: string
          enum: [balance, arc_bsp_cash, card]
        amount:
          type: string
        currency:
          type: string
        order_id:
          type: string
    SeatMap:
      type: object
      properties:
        id:
          type: string
        slice_id:
          type: string
        segment_id:
          type: string
        cabins:
          type: array
          items:
            type: object
            properties:
              cabin_class:
                $ref: "#/components/schemas/CabinClass"
              deck:
                type: integer
              aisles:
                type: integer
              wings:
                type: object
                properties:
                  first_row_index:
                    type: integer
                  last_row_index:
                    type: integer
              rows:
                type: array
                items:
                  type: object
                  properties:
                    sections:
                      type: array
                      items:
                        type: object
                        properties:
                          elements:
                            type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum: [seat, bassinet, empty, exit_row, lavatory, galley, closet, stairs]
                                designator:
                                  type: string
                                name:
                                  type: string
                                disclosures:
                                  type: array
                                  items:
                                    type: string
                                available_services:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                      passenger_id:
                                        type: string
                                      total_amount:
                                        type: string
                                      total_currency:
                                        type: string

    # -------------------------------------------------------------------------
    # Flights: cancellations & changes
    # -------------------------------------------------------------------------
    OrderCancellation:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        order_id:
          type: string
        expires_at:
          type: ["string", "null"]
          format: date-time
        confirmed_at:
          type: ["string", "null"]
          format: date-time
        refund_amount:
          type: ["string", "null"]
        refund_currency:
          type: ["string", "null"]
        refund_to:
          type: string
          enum: [arc_bsp_cash, balance, card, voucher, awaiting_payment, airline_credits]
        airline_credits:
          type: array
          items:
            $ref: "#/components/schemas/AirlineCredit"
    OrderChangeRequest:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
