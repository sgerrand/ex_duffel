openapi: 3.1.0
info:
  title: Duffel API
  version: "2"
  description: |
    OpenAPI specification for the Duffel API (version v2), generated from the
    public documentation at https://duffel.com/docs/api.

    Covers Flights, Stays, Cars, Payments, Identity, Notifications (webhooks)
    and supporting resources.

    All requests must include the `Duffel-Version: v2` header and a Bearer
    access token. Request and response bodies are wrapped in a `data` envelope.
    List endpoints are cursor-paginated via `limit`, `before` and `after`.
  contact:
    name: Duffel
    url: https://duffel.com/docs
  termsOfService: https://duffel.com/legal/terms-and-conditions
servers:
  - url: https://api.duffel.com
    description: Production and test mode (mode determined by access token)
security:
  - bearerAuth: []
tags:
  - name: Offer Requests
    description: Search for flights by describing slices and passengers
  - name: Partial Offer Requests
    description: Multi-step search returning fares per slice
  - name: Batch Offer Requests
    description: Search returning offers in batches as airlines respond
  - name: Offers
    description: Flight offers returned for an offer request
  - name: Orders
    description: Booked flight orders
  - name: Payments
    description: Payments against held orders
  - name: Seat Maps
    description: Seat maps and seat services for an offer
  - name: Order Cancellations
    description: Quote and confirm order cancellations
  - name: Order Change Requests
    description: Request changes to an order
  - name: Order Change Offers
    description: Offers satisfying an order change request
  - name: Order Changes
    description: Confirmable order changes
  - name: Airline-Initiated Changes
    description: Schedule changes initiated by the airline
  - name: Airline Credits
    description: Airline credits usable against new offers
  - name: Airlines
  - name: Aircraft
  - name: Airports
  - name: Cities
  - name: Places
    description: Place autocomplete suggestions
  - name: Loyalty Programmes
    description: Airline loyalty programmes
  - name: Stays - Search
  - name: Stays - Accommodation
  - name: Stays - Quotes
  - name: Stays - Bookings
  - name: Stays - Brands
  - name: Stays - Chains
  - name: Stays - Negotiated Rates
  - name: Stays - Loyalty Programmes
  - name: Cars - Search
  - name: Cars - Quotes
  - name: Cars - Bookings
  - name: Cards
    description: Tokenise customer cards (separate PCI-scoped host api.duffel.cards)
  - name: 3DS Sessions
    description: Three-D Secure sessions for card payments
  - name: Customer Users
  - name: Customer User Groups
  - name: Component Client Keys
  - name: Webhooks
  - name: Webhook Events
  - name: Webhook Deliveries
paths:
  # ---------------------------------------------------------------------------
  # Flights: Offer Requests
  # ---------------------------------------------------------------------------
  /air/offer_requests:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Offer Requests]
      operationId: listOfferRequests
      summary: List offer requests
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: Paginated list of offer requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Offer Requests]
      operationId: createOfferRequest
      summary: Create an offer request
      description: >
        Describe the slices and passengers you want to search for. Offers are
        returned inline when `return_offers` is true (default), otherwise
        retrieve them via the Offers endpoints.
      parameters:
        - name: return_offers
          in: query
          schema:
            type: boolean
            default: true
          description: Whether to include offers in the response
        - name: supplier_timeout
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 60000
            default: 20000
          description: Milliseconds to wait for each airline to respond
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "201":
          description: The created offer request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/offer_requests/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Duffel's unique identifier for the offer request
    get:
      tags: [Offer Requests]
      operationId: getOfferRequest
      summary: Get a single offer request
      responses:
        "200":
          description: The offer request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Partial Offer Requests
  # ---------------------------------------------------------------------------
  /air/partial_offer_requests:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Partial Offer Requests]
      operationId: createPartialOfferRequest
      summary: Create a partial offer request
      description: >
        Multi-step search. Returns offers for each slice independently; select
        one partial offer per slice and fetch full fares with the fares
        endpoint.
      parameters:
        - name: supplier_timeout
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 60000
            default: 20000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "201":
          description: The created partial offer request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/partial_offer_requests/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Partial Offer Requests]
      operationId: getPartialOfferRequest
      summary: Get a partial offer request
      parameters:
        - name: selected_partial_offer[]
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Partial offer IDs already selected for previous slices
      responses:
        "200":
          description: The partial offer request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/partial_offer_requests/{id}/fares:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Partial Offer Requests]
      operationId: getPartialOfferRequestFares
      summary: Get full fares for selected partial offers
      parameters:
        - name: selected_partial_offer[]
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: One selected partial offer ID per slice
      responses:
        "200":
          description: Offer request containing full offers for the selection
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequest"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Batch Offer Requests
  # ---------------------------------------------------------------------------
  /air/batch_offer_requests:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Batch Offer Requests]
      operationId: createBatchOfferRequest
      summary: Create a batch offer request
      description: >
        Returns immediately with `total_batches`; poll the GET endpoint to
        receive offers batch by batch as airlines respond.
      parameters:
        - name: supplier_timeout
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 60000
            default: 20000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "201":
          description: The created batch offer request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BatchOfferRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/batch_offer_requests/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Batch Offer Requests]
      operationId: getBatchOfferRequest
      summary: Get a batch of offers
      description: >
        Long-polls until the next batch of offers is available or all batches
        are returned.
      responses:
        "200":
          description: The next batch of offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BatchOfferRequest"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Offers
  # ---------------------------------------------------------------------------
  /air/offers:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Offers]
      operationId: listOffers
      summary: List offers for an offer request
      parameters:
        - name: offer_request_id
          in: query
          required: true
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [total_amount, total_duration, "-total_amount", "-total_duration"]
          description: Sort order; prefix with `-` for descending
        - name: max_connections
          in: query
          schema:
            type: integer
          description: Only return offers with at most this many connections per slice
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: Paginated list of offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Offer"
        default:
          $ref: "#/components/responses/Error"
  /air/offers/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Offers]
      operationId: getOffer
      summary: Get a single offer
      parameters:
        - name: return_available_services
          in: query
          schema:
            type: boolean
            default: false
          description: Include available services (bags, seats) in the offer
      responses:
        "200":
          description: The offer
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Offer"
        default:
          $ref: "#/components/responses/Error"
  /air/offers/{id}/actions/price:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Offers]
      operationId: priceOffer
      summary: Get the latest price for an offer
      description: Re-prices the offer with the airline and returns the updated offer.
      responses:
        "200":
          description: The re-priced offer
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Offer"
        default:
          $ref: "#/components/responses/Error"
  /air/offers/{offer_id}/passengers/{offer_passenger_id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: offer_id
        in: path
        required: true
        schema:
          type: string
      - name: offer_passenger_id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Offers]
      operationId: updateOfferPassenger
      summary: Update a passenger on an offer
      description: >
        Add loyalty programme accounts or names to an offer passenger before
        booking, so loyalty fares can be applied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  properties:
                    given_name:
                      type: string
                    family_name:
                      type: string
                    loyalty_programme_accounts:
                      type: array
                      items:
                        $ref: "#/components/schemas/LoyaltyProgrammeAccount"
      responses:
        "200":
          description: The updated offer passenger
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OfferRequestPassenger"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Orders
  # ---------------------------------------------------------------------------
  /air/orders:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List orders
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
        - name: booking_reference
          in: query
          schema:
            type: string
          description: Filter by airline booking reference (PNR)
        - name: awaiting_payment
          in: query
          schema:
            type: boolean
          description: Filter hold orders awaiting payment
        - name: sort
          in: query
          schema:
            type: string
            enum: [payment_required_by, "-payment_required_by", created_at, "-created_at", next_departure, "-next_departure"]
        - name: passenger_name[]
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Filter by passenger name
        - name: requires_action
          in: query
          schema:
            type: boolean
          description: Filter orders with pending airline-initiated changes or schedule changes
      responses:
        "200":
          description: Paginated list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Orders]
      operationId: createOrder
      summary: Create an order
      description: >
        Book one selected offer. `type: instant` requires payment inline;
        `type: hold` creates an unpaid order to be paid later via Payments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/CreateOrder"
      responses:
        "201":
          description: The created order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
  /air/orders/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get a single order
      responses:
        "200":
          description: The order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Orders]
      operationId: updateOrder
      summary: Update an order's metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  properties:
                    metadata:
                      $ref: "#/components/schemas/Metadata"
      responses:
        "200":
          description: The updated order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
  /air/orders/{id}/actions/price:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Orders]
      operationId: priceOrder
      summary: Get the latest price for a hold order
      description: Re-prices an unpaid (hold) order with the airline.
      responses:
        "200":
          description: The re-priced order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
  /air/orders/{id}/available_services:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Orders]
      operationId: getOrderAvailableServices
      summary: List services available to add to an order
      responses:
        "200":
          description: Available services (bags, seats, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AvailableService"
        default:
          $ref: "#/components/responses/Error"
  /air/orders/{id}/services:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Orders]
      operationId: createOrderServices
      summary: Add services to an existing order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [add_services, payment]
                  properties:
                    add_services:
                      type: array
                      items:
                        type: object
                        required: [id, quantity]
                        properties:
                          id:
                            type: string
                            description: Available service ID
                          quantity:
                            type: integer
                    payment:
                      $ref: "#/components/schemas/CreatePayment"
      responses:
        "200":
          description: The updated order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Payments
  # ---------------------------------------------------------------------------
  /air/payments:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Payments]
      operationId: listPayments
      summary: List payments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
        - name: order_id
          in: query
          schema:
            type: string
          description: Filter payments by order
      responses:
        "200":
          description: Paginated list of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Payments]
      operationId: createPayment
      summary: Pay for a hold order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [order_id, payment]
                  properties:
                    order_id:
                      type: string
                    payment:
                      $ref: "#/components/schemas/CreatePayment"
      responses:
        "201":
          description: The created payment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
  /air/payments/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Payments]
      operationId: getPayment
      summary: Get a single payment
      responses:
        "200":
          description: The payment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Seat Maps
  # ---------------------------------------------------------------------------
  /air/seat_maps:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Seat Maps]
      operationId: getSeatMaps
      summary: Get seat maps for an offer
      parameters:
        - name: offer_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: One seat map per segment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeatMap"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Order Cancellations
  # ---------------------------------------------------------------------------
  /air/order_cancellations:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Order Cancellations]
      operationId: listOrderCancellations
      summary: List order cancellations
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
        - name: order_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of order cancellations
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderCancellation"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Order Cancellations]
      operationId: createOrderCancellation
      summary: Create a pending order cancellation (quote)
      description: >
        Returns the refund amount the airline will pay. Nothing is cancelled
        until confirmed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [order_id]
                  properties:
                    order_id:
                      type: string
      responses:
        "201":
          description: The pending order cancellation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderCancellation"
        default:
          $ref: "#/components/responses/Error"
  /air/order_cancellations/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Order Cancellations]
      operationId: getOrderCancellation
      summary: Get a single order cancellation
      responses:
        "200":
          description: The order cancellation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderCancellation"
        default:
          $ref: "#/components/responses/Error"
  /air/order_cancellations/{id}/actions/confirm:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Order Cancellations]
      operationId: confirmOrderCancellation
      summary: Confirm an order cancellation
      description: Irreversibly cancels the order and triggers the refund.
      responses:
        "200":
          description: The confirmed order cancellation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderCancellation"
        default:
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Flights: Order Change Requests / Offers / Changes
  # ---------------------------------------------------------------------------
  /air/order_change_requests:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Order Change Requests]
      operationId: createOrderChangeRequest
      summary: Create an order change request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [order_id]
                  properties:
                    order_id:
                      type: string
                    slices:
                      type: object
                      properties:
                        remove:
                          type: array
                          items:
                            type: object
                            required: [slice_id]
                            properties:
                              slice_id:
                                type: string
                        add:
                          type: array
                          items:
                            type: object
                            required: [origin, destination, departure_date, cabin_class]
                            properties:
                              origin:
                                type: string
                              destination:
                                type: string
                              departure_date:
                                type: string
                                format: date
                              cabin_class:
                                $ref: "#/components/schemas/CabinClass"
                    private_fares:
                      $ref: "#/components/schemas/PrivateFares"
      responses:
        "201":
          description: The created order change request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderChangeRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/order_change_requests/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Order Change Requests]
      operationId: getOrderChangeRequest
      summary: Get an order change request
      responses:
        "200":
          description: The order change request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderChangeRequest"
        default:
          $ref: "#/components/responses/Error"
  /air/order_change_offers:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    get:
      tags: [Order Change Offers]
      operationId: listOrderChangeOffers
      summary: List order change offers
      parameters:
        - name: order_change_request_id
          in: query
          required: true
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [change_total_amount, "-change_total_amount", total_duration, "-total_duration"]
        - name: max_connections
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Before"
      responses:
        "200":
          description: Paginated list of order change offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/ListMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderChangeOffer"
        default:
          $ref: "#/components/responses/Error"
  /air/order_change_offers/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Order Change Offers]
      operationId: getOrderChangeOffer
      summary: Get an order change offer
      responses:
        "200":
          description: The order change offer
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderChangeOffer"
        default:
          $ref: "#/components/responses/Error"
  /air/order_changes:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Order Changes]
      operationId: createOrderChange
      summary: Create an order change from a selected change offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [selected_order_change_offer]
                  properties:
                    selected_order_change_offer:
                      type: string
                      description: The order change offer ID to apply
      responses:
        "201":
          description: The created (pending) order change
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderChange"
        default:
          $ref: "#/components/responses/Error"
  /air/order_changes/{id}:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Order Changes]
      operationId: getOrderChange
      summary: Get an order change
      responses:
        "200":
          description: The order change
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderChange"
        default:
          $ref: "#/components/responses/Error"
  /air/order_changes/{id}/actions/confirm:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Order Changes]
      operationId: confirmOrderChange
      summary: Confirm an order change
      description: Irreversibly applies the change to the order, taking payment if due.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    payment:
                      $ref: "#/components/schemas/CreatePayment"
      responses:
        "200":
          description: The confirmed order change
