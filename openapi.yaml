          items:
            type: string
        inbound_flight_number:
          type: ["string", "null"]
        supplier_loyalty_programme_account_number:
          type: ["string", "null"]
    CarsBooking:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        reference:
          type: ["string", "null"]
        status:
          type: string
          enum: [confirmed, cancelled]
        quote_id:
          type: string
        driver:
          $ref: "#/components/schemas/CarsDriver"
        car:
          $ref: "#/components/schemas/Car"
        supplier:
          $ref: "#/components/schemas/CarsSupplier"
        pickup_date:
          type: string
          format: date
        pickup_time:
          type: string
        pickup_location:
          type: object
        dropoff_date:
          type: string
          format: date
        dropoff_time:
          type: string
        dropoff_location:
          type: object
        total_amount:
          type: string
        total_currency:
          type: string
        base_amount:
          type: ["string", "null"]
        base_currency:
          type: ["string", "null"]
        payment_type:
          type: string
          enum: [postpaid, guarantee, prepaid]
        charges:
          type: ["array", "null"]
          items:
            type: object
        conditions:
          type: array
          items:
            type: object
        mileage:
          $ref: "#/components/schemas/CarsMileage"
        confirmed_at:
          type: ["string", "null"]
          format: date-time
        cancelled_at:
          type: ["string", "null"]
          format: date-time
        metadata:
          $ref: "#/components/schemas/Metadata"
        users:
          type: array
          items:
            type: string
        privacy_policies:
          type: ["array", "null"]
          items:
            type: object

    # -------------------------------------------------------------------------
    # Payments: cards & 3DS
    # -------------------------------------------------------------------------
    CreateCard:
      type: object
      required: [number, expiry_month, expiry_year, cvc, name, address_line_1, address_city, address_country_code, address_postal_code]
      properties:
        number:
          type: string
        expiry_month:
          type: string
          description: MM
        expiry_year:
          type: string
          description: YY
        cvc:
          type: string
        name:
          type: string
          description: Cardholder name
        address_line_1:
          type: string
        address_line_2:
          type: ["string", "null"]
        address_city:
          type: string
        address_region:
          type: ["string", "null"]
        address_postal_code:
          type: string
        address_country_code:
          type: string
        multi_use:
          type: boolean
          default: false
          description: Whether the card can be reused for multiple payments
    Card:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        last_4_digits:
          type: string
        brand:
          type: string
          description: e.g. `visa`, `mastercard`, `american_express`
        multi_use:
          type: boolean
        unavailable_at:
          type: ["string", "null"]
          format: date-time
          description: When a single-use card becomes unusable
    ThreeDSecureSession:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        card_id:
          type: string
        resource_id:
          type: string
        status:
          type: string
          enum: [client_action_required, ready_for_payment, failed, expired]
        client_id:
          type: ["string", "null"]
          description: Token for the client-side 3DS challenge component

    # -------------------------------------------------------------------------
    # Identity
    # -------------------------------------------------------------------------
    CreateCustomerUser:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        given_name:
          type: ["string", "null"]
        family_name:
          type: ["string", "null"]
        phone_number:
          type: ["string", "null"]
        group_id:
          type: ["string", "null"]
    CustomerUser:
      type: object
      properties:
        id:
          type: string
        live_mode:
          type: boolean
        created_at:
          type: string
          format: date-time
        email:
          type: string
          format: email
        given_name:
          type: ["string", "null"]
        family_name:
          type: ["string", "null"]
        phone_number:
          type: ["string", "null"]
        group:
          oneOf:
            - $ref: "#/components/schemas/CustomerUserGroup"
            - type: "null"
    CustomerUserGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        user_ids:
          type: array
          items:
            type: string
