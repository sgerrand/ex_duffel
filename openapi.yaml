  # ---------------------------------------------------------------------------
  # Payments: Cards (PCI-scoped host) and 3DS Sessions
  # ---------------------------------------------------------------------------
  /payments/cards:
    servers:
      - url: https://api.duffel.cards
        description: PCI-scoped host for card tokenisation
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [Cards]
      operationId: createCard
      summary: Tokenise a card
      description: >
        Stores card details and returns a card ID for use in payments and 3DS
        sessions. Served from `api.duffel.cards`, not the main API host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "#/components/schemas/CreateCard"
      responses:
        "201":
          description: The tokenised card
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Card"
        default:
          $ref: "#/components/responses/Error"
  /payments/cards/{id}:
    servers:
      - url: https://api.duffel.cards
        description: PCI-scoped host for card tokenisation
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [Cards]
      operationId: deleteCard
      summary: Delete a card
      responses:
        "204":
          description: Card deleted
        default:
          $ref: "#/components/responses/Error"
  /payments/three_d_secure_sessions:
    parameters:
      - $ref: "#/components/parameters/DuffelVersion"
    post:
      tags: [3DS Sessions]
      operationId: createThreeDSecureSession
      summary: Create a 3DS session for a card payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [card_id, resource_id, services]
                  properties:
                    card_id:
                      type: string
                    resource_id:
                      type: string
                      description: ID of the offer, order, quote or booking being paid for
                    services:
                      type: array
                      items:
                        type: object
                        required: [id, quantity]
                        properties:
                          id:
                            type: string
                          quantity:
                            type: integer
                    exception:
                      type: string
                      enum: [secure_corporate_payment]
                      description: Request an SCA exception
                    cardholder_present:
                      type: boolean
      responses:
        "201":
          description: The 3DS session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ThreeDSecureSession"
        default:
          $ref: "#/components/responses/Error"

